name: ImmortalWrt Newifi D2 64MB (中文LuCI + 完整IPv6)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'ImmortalWrt 分支 (推荐 master 或 openwrt-23.05)'
        required: false
        default: 'master'

env:
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置时区
        run: sudo timedatectl set-timezone "$TZ"

      - name: 安装编译依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache ecj fastjar file g++ gawk \
            gettext git libelf-dev libncurses5-dev libssl-dev python3 python3-distutils \
            python3-setuptools python3-dev rsync subversion swig time \
            unzip wget xsltproc zlib1g-dev

      - name: 克隆 ImmortalWrt 源码
        run: |
          git clone https://github.com/immortalwrt/immortalwrt.git -b ${{ inputs.branch || 'master' }} openwrt
          cd openwrt

      - name: 更新并安装 feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 修改为 64MB 闪存（DTS + image size）
        working-directory: openwrt
        run: |
          # 修改 DTS 中的 firmware 分区大小（从 ~32MB 扩展到 ~63MB 可写）
          sed -i 's/reg = <0x50000 0x[0-9a-f]*>;*/reg = <0x50000 0x3fb0000>;/' \
            target/linux/ramips/dts/mt7621_d-team_newifi-d2.dts

          # 修改 image.mk 中的 IMAGE_SIZE 为 65216k（64MB - 引导等预留）
          sed -i '/DEVICE_d-team_newifi-d2/,/IMAGE_SIZE/ s/IMAGE_SIZE := [0-9]\+k/IMAGE_SIZE := 65216k/' \
            target/linux/ramips/image/mt7621.mk || \
          sed -i 's/IMAGE_SIZE := [0-9]\+k/IMAGE_SIZE := 65216k/' \
            target/linux/ramips/image/mt7621.mk

          echo "已修改为 64MB 闪存分区"

      - name: 配置 .config（强制中文 LuCI + IPv6 + 基本工具）
        working-directory: openwrt
        run: |
          cat > .config << 'EOF'
          CONFIG_TARGET_ramips=y
          CONFIG_TARGET_ramips_mt7621=y
          CONFIG_TARGET_ramips_mt7621_DEVICE_d-team_newifi-d2=y

          # LuCI + 中文支持（ImmortalWrt 默认友好，强制选上）
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-ssl=y
          CONFIG_PACKAGE_luci-base=y
          CONFIG_PACKAGE_luci-mod-admin-full=y
          CONFIG_PACKAGE_luci-mod-network=y
          CONFIG_PACKAGE_luci-mod-status=y
          CONFIG_PACKAGE_luci-mod-system=y
          CONFIG_PACKAGE_luci-app-firewall=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-firewall-zh-cn=y

          # 完整 IPv6 支持
          CONFIG_IPV6=y
          CONFIG_PACKAGE_luci-proto-ipv6=y
          CONFIG_PACKAGE_odhcp6c=y
          CONFIG_PACKAGE_odhcpd-ipv6only=y
          CONFIG_PACKAGE_6in4=y
          CONFIG_PACKAGE_ip6tables=y
          CONFIG_PACKAGE_kmod-ipt-nat6=y

          # 基本工具（确保 opkg 等存在）
          CONFIG_PACKAGE_opkg=y
          CONFIG_PACKAGE_busybox=y

          # WiFi 驱动（mt7621 常用）
          CONFIG_PACKAGE_kmod-mt7603=y
          CONFIG_PACKAGE_kmod-mt76x2=y
          EOF

          make defconfig
          echo "配置完成：中文 LuCI + IPv6 已启用"

      - name: 下载依赖包
        working-directory: openwrt
        run: make download -j$(nproc) || make download -j1

      - name: 编译固件
        working-directory: openwrt
        run: |
          make -j$(nproc) V=s || make -j1 V=s
          echo "编译结束"

      - name: 收集输出固件
        working-directory: openwrt
        run: |
          mkdir -p ../artifacts
          find bin/targets/ramips/mt7621/ -type f \( -name "*newifi-d2*squashfs-sysupgrade.bin" -o -name "*newifi-d2*initramfs*" \) -exec cp {} ../artifacts/ \;
          ls -lh ../artifacts/

      - name: 上传固件 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-Newifi-D2-64MB-${{ github.run_number }}
          path: artifacts/
          retention-days: 14
