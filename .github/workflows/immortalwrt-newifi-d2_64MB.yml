name: 编译 ImmortalWrt 稳定版固件 (Newifi D2 64MB 改ROM)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 安装编译依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential ccache ecj fastjar file g++ gawk gettext \
            git libelf1 libncurses5-dev \
            libssl-dev libxml2-dev mercurial patch python3 python3-pip \
            python3-setuptools rsync subversion unzip wget xsltproc \
            zlib1g-dev libgmp3-dev libmpc-dev libmpfr-dev libisl-dev \
            libzstd-dev liblzma-dev quilt

      - name: 克隆 ImmortalWrt 稳定版源码 (v24.10.5)
        run: |
          git clone --depth 1 -b v24.10.5 https://github.com/immortalwrt/immortalwrt.git immortalwrt

      - name: 更新 feeds 并安装
        run: |
          cd immortalwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 修改 DTS 和 MK 文件（支持 64MB ROM）
        run: |
          cd immortalwrt
          # 修改 DTS：将 firmware 分区从 ~32MB 扩大到 ~64MB
          sed -i 's/0x1fb0000/0x3fb0000/g' target/linux/ramips/dts/mt7621_d-team_newifi-d2.dts
          # 修改 MK：将 IMAGE_SIZE 从 32448k 改为 65216k（64MB - 引导区）
          sed -i 's/32448k/65216k/g' target/linux/ramips/image/mt7621.mk
          echo "✅ DTS 和 MK 已修改为 64MB ROM"

      - name: 生成 .config（目标设备 + 完整功能）
        run: |
          cd immortalwrt
          cat > .config << 'EOF'
          # 基础目标
          CONFIG_TARGET_ramips=y
          CONFIG_TARGET_ramips_mt7621=y
          CONFIG_TARGET_ramips_mt7621_d-team_newifi-d2=y

          # LuCI + 简体中文界面
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-firewall-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-opkg-zh-cn=y

          # Argon 主题
          CONFIG_PACKAGE_luci-theme-argon=y
          CONFIG_PACKAGE_luci-app-argon-config=y

          # 完整 IPv6 协议支持
          CONFIG_PACKAGE_luci-proto-ipv6=y
          CONFIG_PACKAGE_ip6tables=y
          CONFIG_PACKAGE_ip6tables-extra=y
          CONFIG_PACKAGE_kmod-ip6tables=y
          CONFIG_PACKAGE_odhcp6c=y
          CONFIG_PACKAGE_odhcpd=y

          # USB 3.0（设备默认已包含 kmod-usb3）
          CONFIG_PACKAGE_kmod-usb3=y
          CONFIG_PACKAGE_block-mount=y
          CONFIG_PACKAGE_kmod-fs-ext4=y
          CONFIG_PACKAGE_kmod-fs-vfat=y
          CONFIG_PACKAGE_kmod-fs-exfat=y

          # 必备工具
          CONFIG_PACKAGE_lsblk=y
          CONFIG_PACKAGE_htop=y
          CONFIG_PACKAGE_btop=y

          # 其他必要组件
          CONFIG_PACKAGE_uhttpd=y
          CONFIG_PACKAGE_opkg=y
          EOF

          # 生成最终 config
          make defconfig
          echo "✅ .config 已生成并执行 defconfig"

      - name: 下载源码包
        run: |
          cd immortalwrt
          make download -j$(nproc)

      - name: 编译固件（可根据机器调整线程数）
        run: |
          cd immortalwrt
          make -j$(nproc) V=s

      - name: 上传固件到 Actions 产物
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-Newifi-D2-64MB
          path: immortalwrt/bin/targets/ramips/mt7621/immortalwrt-*-d-team_newifi-d2-*.bin
          retention-days: 30
